apiVersion: v1
kind: ServiceAccount
metadata:
  name: hybrid-demo-triggers
  namespace: hybrid-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hybrid-demo-triggers-eventlistener
  namespace: hybrid-dev
subjects:
  - kind: ServiceAccount
    name: hybrid-demo-triggers
    namespace: hybrid-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-roles
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hybrid-demo-triggers-eventlistener-cluster
  namespace: hybrid-dev
subjects:
  - kind: ServiceAccount
    name: hybrid-demo-triggers
    namespace: hybrid-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-clusterroles
---
# Pipeline service account: used by the PipelineRun pods.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: pipeline
  namespace: hybrid-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hybrid-demo-pipeline-registry-edit
  namespace: hybrid-dev
subjects:
  - kind: ServiceAccount
    name: pipeline
    namespace: hybrid-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:image-builder
