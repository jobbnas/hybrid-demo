apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: hybrid-demo-build
  namespace: hybrid-dev
spec:
  description: >-
    Clone the Quarkus app from GitHub, build with Buildah from the repo
    Containerfile, push to the ROSA HCP internal registry, then bump the
    image tag in overlays/dev-rosa/kustomization.yaml so the ROSA Argo
    auto-syncs the dev deployment.
  params:
    - name: git-url
      description: GitHub repo URL (https)
      type: string
    - name: git-revision
      description: Git ref to build
      type: string
      default: main
    - name: image-repo
      description: Image repo (no tag) — internal registry path
      type: string
    - name: image-tag
      description: Tag for the new build (short SHA)
      type: string
    - name: kustomization-path
      description: Path within the repo to the dev overlay kustomization.yaml
      type: string
      default: k8s/overlays/dev-rosa/kustomization.yaml
  workspaces:
    - name: source
      description: Cloned repo workspace
    - name: dockerconfig
      description: Registry auth (push)
    - name: git-auth
      description: GitHub PAT for the bump-back commit (basic-auth secret)
  tasks:
    - name: clone
      params:
        - name: url
          value: $(params.git-url)
        - name: revision
          value: $(params.git-revision)
      workspaces:
        - name: output
          workspace: source
      taskSpec:
        params:
          - name: url
          - name: revision
        workspaces:
          - name: output
        steps:
          - name: clone
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            script: |
              #!/usr/bin/env bash
              set -euo pipefail
              microdnf install -y git >/dev/null
              cd $(workspaces.output.path)
              git clone --depth 1 --branch "$(params.revision)" "$(params.url)" .
              git rev-parse --short HEAD > .git-sha
              echo "Cloned $(params.url)@$(params.revision) sha=$(cat .git-sha)"

    - name: buildah-build-push
      runAfter: [clone]
      params:
        - name: image
          value: "$(params.image-repo):$(params.image-tag)"
      workspaces:
        - name: source
          workspace: source
        - name: dockerconfig
          workspace: dockerconfig
      taskSpec:
        params:
          - name: image
        workspaces:
          - name: source
          - name: dockerconfig
        steps:
          - name: build-and-push
            image: registry.redhat.io/rhel9/buildah:latest
            securityContext:
              capabilities:
                add: ["SETFCAP"]
            env:
              - name: DOCKER_CONFIG
                value: $(workspaces.dockerconfig.path)
              - name: STORAGE_DRIVER
                value: vfs
            script: |
              #!/usr/bin/env bash
              set -euo pipefail
              cd $(workspaces.source.path)
              buildah bud --storage-driver=vfs --tls-verify=false -f Containerfile -t $(params.image) .
              buildah push --storage-driver=vfs --tls-verify=false $(params.image)

    - name: bump-dev-overlay
      runAfter: [buildah-build-push]
      params:
        - name: image
          value: "$(params.image-repo):$(params.image-tag)"
        - name: kustomization-path
          value: $(params.kustomization-path)
        - name: git-url
          value: $(params.git-url)
        - name: git-revision
          value: $(params.git-revision)
      workspaces:
        - name: source
          workspace: source
        - name: git-auth
          workspace: git-auth
      taskSpec:
        params:
          - name: image
          - name: kustomization-path
          - name: git-url
          - name: git-revision
        workspaces:
          - name: source
          - name: git-auth
        steps:
          - name: bump-and-push
            image: registry.access.redhat.com/ubi9/ubi-minimal:latest
            script: |
              #!/usr/bin/env bash
              set -euo pipefail
              microdnf install -y git tar gzip ca-certificates >/dev/null
              # Install kustomize (statically linked binary).
              curl -sSL -o /tmp/kustomize.tgz \
                https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz
              tar -xzf /tmp/kustomize.tgz -C /tmp
              install -m 0755 /tmp/kustomize /usr/local/bin/kustomize

              cd $(workspaces.source.path)
              IMAGE_REPO="$(echo '$(params.image)' | cut -d: -f1)"
              IMAGE_TAG="$(echo '$(params.image)' | cut -d: -f2)"

              cd "$(dirname '$(params.kustomization-path)')"
              kustomize edit set image "hybrid-demo=${IMAGE_REPO}:${IMAGE_TAG}"
              cd $(workspaces.source.path)

              # Configure Git from the basic-auth secret workspace.
              git config --global user.email "tekton@hybrid-demo.local"
              git config --global user.name  "hybrid-demo Tekton"
              git config --global credential.helper "store --file=$(workspaces.git-auth.path)/.git-credentials"

              # Build a credentials file from the .git-credentials of the basic-auth secret.
              # OpenShift Pipelines basic-auth secrets mount as username/password files in /workspace.
              if [ -f "$(workspaces.git-auth.path)/username" ] && [ -f "$(workspaces.git-auth.path)/password" ]; then
                USER=$(cat $(workspaces.git-auth.path)/username)
                PASS=$(cat $(workspaces.git-auth.path)/password)
                HOST=$(echo '$(params.git-url)' | sed -E 's#https?://([^/]+)/.*#\1#')
                echo "https://${USER}:${PASS}@${HOST}" > ~/.git-credentials
                git config --global credential.helper "store --file=$HOME/.git-credentials"
              fi

              git checkout "$(params.git-revision)"
              git add "$(params.kustomization-path)"
              if git diff --cached --quiet; then
                echo "No change; image tag already current."
              else
                git commit -m "ci: bump dev image to ${IMAGE_TAG} [skip ci]"
                git push origin "$(params.git-revision)"
              fi
