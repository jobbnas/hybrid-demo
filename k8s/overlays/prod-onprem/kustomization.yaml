apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: hybrid-prod
resources:
  - ../../base
# Image pulled from the ROSA HCP exposed internal registry.
# Set ROSA_REGISTRY_HOST in setup/30-argocd-apps.sh; this value is patched in
# at install time so the prod-onprem overlay points at the public Route.
images:
  - name: hybrid-demo
    newName: ROSA_REGISTRY_HOST/hybrid-dev/hybrid-demo
    newTag: latest # bumped via PR from dev → prod for promotion
patches:
  - target:
      kind: Deployment
      name: hybrid-demo
    patch: |-
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: CLUSTER_NAME
          value: onprem-ocp
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: CLUSTER_ROLE
          value: prod
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: CLUSTER_REGION
          value: on-prem
      - op: add
        path: /spec/template/spec/containers/0/env/-
        value:
          name: APP_MESSAGE
          value: "Running on-prem. Promoted from AWS via GitOps."
  - target:
      kind: Deployment
      name: hybrid-demo
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
