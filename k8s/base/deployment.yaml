apiVersion: apps/v1
kind: Deployment
metadata:
  name: hybrid-demo
  labels:
    app: hybrid-demo
    app.kubernetes.io/name: hybrid-demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hybrid-demo
  template:
    metadata:
      labels:
        app: hybrid-demo
        app.kubernetes.io/name: hybrid-demo
    spec:
      containers:
        - name: hybrid-demo
          image: hybrid-demo:latest # overridden per overlay
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          readinessProbe:
            httpGet:
              path: /q/health/ready
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /q/health/live
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          env:
            - name: APP_VERSION
              value: "1.0.0"
            - name: APP_GIT_SHA
              value: "seed" # overridden by Tekton via kustomize patch
